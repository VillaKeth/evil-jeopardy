<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evil Jeopardy²</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="status-bar">
    <span id="connection-status" class="connection-dot"></span>
    <span>Evil Jeopardy²</span>
  </div>

  <div class="lobby">
    <h1 class="lobby-title">Evil Jeopardy²</h1>
    <p class="lobby-subtitle">IT'S BACK BABY!</p>
    <div class="lobby-card">
    <div id="join-form" class="lobby-form">
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
      <div style="margin-top:8px;">
        <label for="avatar-input" style="font-size:0.8rem;opacity:0.7;cursor:pointer;">
          📷 Upload avatar (optional)
        </label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none;">
      </div>
      <button id="join-btn">Join Game</button>
    </div>
    <div id="waiting-room" style="display:none">
      <p>Welcome, <strong id="display-name"></strong>!</p>
      <p>Waiting for host to start...</p>
    </div>
    <div class="player-list">
      <h3>Players (<span id="player-count">0</span>)</h3>
      <ul id="players"></ul>
    </div>
    </div>
    <div id="lobby-footer" style="text-align:center; padding:1rem; opacity:0.6;">
      <small>Share this URL with players: <strong id="share-url"></strong></small>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket-setup.js"></script>
  <script>
    const socket = createSocket();
    const joinForm = document.getElementById('join-form');
    const waitingRoom = document.getElementById('waiting-room');
    const nameInput = document.getElementById('player-name');
    const joinBtn = document.getElementById('join-btn');
    const displayName = document.getElementById('display-name');
    const playersList = document.getElementById('players');
    const playerCount = document.getElementById('player-count');

    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) return;
      socket.emit('join', { name });
    });

    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    socket.on('joined', ({ name }) => {
      sessionStorage.setItem('playerName', name);
      joinForm.style.display = 'none';
      waitingRoom.style.display = 'block';
      displayName.textContent = name;

      const avatarFile = document.getElementById('avatar-input').files[0];
      if (avatarFile) {
        const formData = new FormData();
        formData.append('image', avatarFile);
        formData.append('name', name);
        fetch('/api/avatar', { method: 'POST', body: formData })
          .then(r => r.json())
          .then(data => sessionStorage.setItem('playerAvatar', data.avatar))
          .catch(console.error);
      }
    });

    socket.on('player-list', (players) => {
      playersList.innerHTML = '';
      playerCount.textContent = players.length;
      players.forEach(p => {
        const li = document.createElement('li');
        li.style.display = 'flex';
        li.style.alignItems = 'center';
        li.appendChild(createAvatarElement(p, 'avatar-small'));
        const span = document.createElement('span');
        span.textContent = p.name + (p.connected ? '' : ' (disconnected)');
        li.appendChild(span);
        playersList.appendChild(li);
      });
    });

    socket.on('game-started', () => {
      window.location.href = '/play.html';
    });

    // Latency calibration - respond to pings
    socket.on('calibration-ping', (data) => {
      socket.emit('calibration-pong', data);
    });

    socket.on('join-error', ({ message }) => {
      alert(message);
    });

    // Populate share URL
    document.getElementById('share-url').textContent = window.location.href;

    function createAvatarElement(player, sizeClass) {
      if (player.avatar) {
        const img = document.createElement('img');
        img.src = player.avatar;
        img.className = sizeClass;
        img.alt = player.name;
        return img;
      }
      const div = document.createElement('div');
      const size = sizeClass === 'avatar-medium' ? '32px' : '24px';
      div.className = 'avatar-default ' + sizeClass;
      div.style.width = size;
      div.style.height = size;
      div.style.fontSize = sizeClass === 'avatar-medium' ? '0.8rem' : '0.65rem';
      let hash = 0;
      for (let i = 0; i < player.name.length; i++) {
        hash = player.name.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      div.style.backgroundColor = `hsl(${hue}, 60%, 45%)`;
      const parts = player.name.trim().split(/\s+/);
      const initials = parts.length > 1
        ? (parts[0][0] + parts[1][0]).toUpperCase()
        : player.name.substring(0, 2).toUpperCase();
      div.textContent = initials;
      return div;
    }
  </script>
</body>
</html>
